<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Koně 🐎</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff8f0; /* jemně béžové pozadí */
      color: #333;
      text-align: center;
      padding: 30px;
    }
    h1 {
      color: #b5651d; /* hnědá barva */
      font-size: 3em;
      margin-bottom: 10px;
    }
    h2 {
      color: #8b4513;
    }
    p {
      font-size: 1.2em;
    }
    ul {
      list-style: square;
      display: inline-block;
      text-align: left;
      margin-top: 20px;
    }
    img {
      margin-top: 20px;
      max-width: 80%;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    a {
      display: inline-block;
      margin-top: 30px;
      text-decoration: none;
      color: white;
      background-color: #b5651d;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background 0.3s;
    }
    a:hover {
      background-color: #8b4513;
    }
  </style>
</head>
<body>

<h1>Koně 🐎</h1>

<p>Kůň je ušlechtilé zvíře, které člověk využívá po tisíce let.</p>

<h2>Zajímavosti o koních</h2>
<ul>
  <li>Koně mají výbornou paměť</li>
  <li>Dokážou spát i ve stoje</li>
  <li>Jsou velmi inteligentní a citliví</li>
</ul>

<h2>Obrázek koně</h2>
<img src="kone.jpg" alt="Kůň na louce">

<br>

<a href="index.html">⬅ Zpět na hlavní stránku</a>

</body>
</html>
